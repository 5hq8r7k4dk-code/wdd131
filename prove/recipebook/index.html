<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

    <title>Recipe Book</title>
    <link href="recipebook.css" rel="stylesheet">
    <script src="recipebook.js" defer></script>
</head>
<body>
    <header>
        <img id="recipe-image" src="images/recipe-book.png" alt="Recipe book logo">
        <h1>RecipeBook</h1>
    </header>
    <section id="search-container">
        <input id="search" type="text" placeholder="Fifnd a recipe">
        <button><img src="images/search.svg" alt="search icon"></button>
    </section>
    <hr>
    <div id="recipe-container">
        <section class="recipe-card">
                <img class="recipe-card-image" src="images/apple-crisp.jpg" alt="Apple Crisp in a bowl with Icecream">   
            <div id="recipe-content">
                <button>dessert</button>
                <h2>Apple Crisp</h2>
                <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
                >
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                
                <p>
                    This apple crisp recipe is a simple yet delicious fall
                    dessert that's great served warm with vanilla ice cream.
                </p>
            </div>
        </section>
    </div>
    <footer>
        <div id="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                  
        
        <a id="flaticon-link" href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
    </footer>
</body>
</html>
