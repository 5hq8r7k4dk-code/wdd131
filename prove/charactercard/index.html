<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link href="charactercard.css" rel="stylesheet">
    <script src="charactercard.js" defer></script>
</head>
<body>
    <div class="card">
        <img class="image" src="snortleblat.webp" alt="A Snortleblat in a Marsh">
        <h1 class="name">Snortleblat</h1>
        <div class="stats">
            <p id="class"><b>Class: </b>Swamp Beats Diplomat</p>
            <p id="level"><b>Level: </b>5</p>
            <p id="health"><b>Health: </b>100</p>
        </div>

        <div class="buttons">
            <button id="attacked_button" type="button">Attacked</button>
            <button id="level_up_button" type="button">Level Up</button>
        </div>
    </div>
</body>
</html>
